version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: finassist-postgres
    environment:
      POSTGRES_USER: finassist
      POSTGRES_PASSWORD: finassist
      POSTGRES_DB: finassist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_create_expenses.sql:/docker-entrypoint-initdb.d/001_create_expenses.sql
      - ./migrations/002_add_installments_and_recurring.sql:/docker-entrypoint-initdb.d/002_add_installments_and_recurring.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finassist -d finassist"]
      interval: 5s
      timeout: 5s
      retries: 5

  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: finassist-evolution
    ports:
      - "8080:8080"
    environment:
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1035712111"

      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}

      WEBHOOK_GLOBAL_URL: http://host.docker.internal:3000/webhook
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_RETRY_USE_EXPONENTIAL_BACKOFF: "true"
      WEBHOOK_BASE64: "true"

      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "false"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "false"

      CONFIG_SESSION_PHONE_CLIENT: "FinAssist"
      CONFIG_SESSION_PHONE_NAME: "Chrome"

      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://finassist:finassist@postgres:5432/finassist?schema=evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution

      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - evolution_data:/evolution/instances

  redis:
    image: redis:7-alpine
    container_name: finassist-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finassist-app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://finassist:finassist@postgres:5432/finassist?sslmode=disable
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      EVOLUTION_WEBHOOK_SECRET: ${EVOLUTION_WEBHOOK_SECRET}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE}
      ALLOWED_NUMBERS: ${ALLOWED_NUMBERS}
      OWNER_PHONE: ${OWNER_PHONE}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  evolution_data:
  redis_data: